  margin-top: 14px;
}

summary {

function toRadians(deg) {
  return deg * (Math.PI / 180);
}

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = toRadians(lat2 - lat1);
  const dLon = toRadians(lon2 - lon1);

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  const km = R * c;
  return km * 0.621371;
}

const cardsContainer = document.getElementById('cardsContainer');
const searchInput = document.getElementById('searchInput');
const categoryFilter = document.getElementById('categoryFilter');
const ratingFilter = document.getElementById('ratingFilter');
const sortSelect = document.getElementById('sortSelect');

function renderCards() {
  const search = searchInput.value.toLowerCase();
  const category = categoryFilter.value;
  const rating = parseFloat(ratingFilter.value);
  const sort = sortSelect.value;

  let filtered = places.filter(place => {
    const matchesSearch =
      place.name.toLowerCase().includes(search) ||
      place.description.toLowerCase().includes(search);

    const matchesCategory =
      category === 'all' || place.category === category;

    const matchesRating = place.rating >= rating;

    return matchesSearch && matchesCategory && matchesRating;
  });

  filtered = filtered.map(place => {
    const distance = calculateDistance(
      treehouseLat,
      treehouseLon,
      place.lat,
      place.lon
    );

    return { 
      ...place, 
      distance,
      isLocal: distance <= 10
    };
  });

  const priceOrder = {
    'free': 0,
    'inexpensive': 1,
    'moderate': 2,
    'higher priced': 3
  };

  if (sort === 'distance') {
    filtered.sort((a,b) => a.distance - b.distance);
  }

  if (sort === 'rating') {
    filtered.sort((a,b) => b.rating - a.rating);
  }

  if (sort === 'price') {
    filtered.sort((a,b) => priceOrder[a.priceCategory] - priceOrder[b.priceCategory]);
  }

  if (sort === 'name') {
    filtered.sort((a,b) => a.name.localeCompare(b.name));
  }

  cardsContainer.innerHTML = '';

  filtered.forEach(place => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="category">${place.category}</div>
      <div class="title">
        ${place.name}
        ${place.isLocal ? '<span class="local-tag">LOCAL</span>' : ''}
      </div>

      <div class="meta">⭐ ${place.rating}</div>
      <div class="meta distance">📍 ${place.distance.toFixed(1)} miles from Treehouse</div>

      <details>
        <summary>💲 ${place.priceCategory}</summary>
        <div style="margin-top:8px; line-height:1.4;">${place.priceDetails}</div>
      </details>

      <div class="desc">${place.description}</div>
      <div class="desc"><strong>Address:</strong> ${place.address}</div>

      ${place.hours ? `<div class="desc"><strong>Hours:</strong> ${place.hours}</div>` : ''}
      ${place.accessibility ? `<div class="desc"><strong>Accessibility:</strong> ${place.accessibility}</div>` : ''}
      ${place.notes ? `<div class="desc"><strong>Notes:</strong> ${place.notes}</div>` : ''}

      <div class="buttons">
        ${place.website ? `<a class="btn" href="${place.website}" target="_blank">Website</a>` : ''}
        <a class="btn secondary" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.address)}" target="_blank">Directions</a>
        ${place.phone ? `<a class="btn secondary" href="tel:${place.phone}">Call</a>` : ''}
      </div>
    `;

    cardsContainer.appendChild(card);
  });
}

searchInput.addEventListener('input', renderCards);
categoryFilter.addEventListener('change', renderCards);
ratingFilter.addEventListener('change', renderCards);
sortSelect.addEventListener('change', renderCards);

renderCards();
</script>
